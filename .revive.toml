# Revive configuration
severity = "warning"
confidence = 0.8
errorCode = 0
warningCode = 0

[enabledRules]
# Blank import rules
blank-imports = true
context-as-argument = true
context-keys-type = true
cyclomatic = true
defer = true
dot-imports = false
duplicated-imports = true
errorf = true
error-naming = true
error-strings = true
exported = false
flag-parameter = true
get-return = true
if-return = true
import-shadowing = true
increment-decrement = true
indent-error-flow = true
interface-naming = false
max-public-structs = true
methods = false
modifies-parameter = true
modifies-receiver = true
name-results = false
nested-structs = true
nolint = true
package-comments = true
range = true
range-val-in-closure = true
receiver-naming = true
redefines-builtin-id = true
string-format = true
string-of-regexp = true
struct-tag = true
superfluous-else = true
time-equal = true
time-naming = true
unexported-naming = false
unexported-return = true
unhandled-error = false
unnecessary-stmt = true
unreachable-code = true
unused-parameter = true
unused-receiver = true
var-declaration = true
var-naming = true
whitespace = true
