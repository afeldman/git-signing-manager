version: 2

project_name: git-signing-manager-gui

before:
  hooks:
    - go mod tidy

builds:
  - id: gui
    main: ./cmd/gui
    binary: gsm-gui
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: gui-archives
    ids:
      - gui
    formats: 
      - tar.gz
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums-gui.txt"

changelog:
  skip: true

release:
  draft: false
  prerelease: auto
  extra_files: []
